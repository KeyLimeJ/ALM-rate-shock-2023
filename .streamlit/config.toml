# Streamlit configuration for the ALM Rate Shock 2023 dashboard.
# This file is read both locally and on Streamlit Community Cloud.

[theme]
# Conservative, finance-publication-style theme.
primaryColor = "#c0392b"             # SVB red (the casualty color used throughout)
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f5f5"
textColor = "#1f1f1f"
font = "sans serif"

[server]
# Default headless mode off — for local development.
# Streamlit Cloud overrides this anyway.
headless = false

[browser]
gatherUsageStats = false
